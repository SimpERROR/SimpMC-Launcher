<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>创建角色</title>
    <script src="i18n.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: rgba(30, 30, 30, 0.95);
            color: white;
            height: 100vh;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title-bar {
            height: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            -webkit-app-region: drag;
            padding: 0 15px;
        }

        .controls {
            -webkit-app-region: no-drag;
        }

        .btn {
            cursor: pointer;
            padding: 5px 10px;
            font-size: 14px;
        }

        .btn:hover { background: rgba(255, 255, 255, 0.1); }

        .content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100% - 40px);
        }

        .input-group {
            margin-bottom: 20px;
            width: 100%;
            max-width: 300px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1976D2;
        }

        .input-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-primary {
            padding: 12px 30px;
            background: #1976D2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-primary:hover {
            background: #1565C0;
        }

        .btn-primary:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .btn-secondary {
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .type-badge.offline {
            background: rgba(255, 152, 0, 0.2);
            color: #FF9800;
        }

        .type-badge.online {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }

        .hidden {
            display: none;
        }

        .status-message {
            margin-top: 15px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
        }

        .status-message.error {
            color: #f44336;
        }

        .status-message.success {
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="title-bar">
        <span data-i18n="character.title"></span>
        <div class="controls">
            <span class="btn" onclick="window.simpmcAPI.closeCharacterWindow()">×</span>
        </div>
    </div>

    <div class="content">
        <div id="type-badge-offline" class="type-badge offline">
            <span data-i18n="auth.offline_character"></span>
        </div>
        <div id="type-badge-online" class="type-badge online hidden">
            <span data-i18n="auth.official_character"></span>
        </div>

        <div id="offline-config">
            <div class="input-group">
                <label for="username" data-i18n="character.username"></label>
                <input type="text" id="username" data-i18n="character.username">
            </div>

            <div class="input-group">
                <label for="offline-uuid" data-i18n="character.uuid"></label>
                <input type="text" id="offline-uuid" data-i18n="character.uuid">
            </div>

            <div class="input-group">
                <label for="skin-select" data-i18n="character.skin"></label>
                <select id="skin-select" style="width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(20, 20, 20, 0.95); color: white; box-sizing: border-box; cursor: pointer;">
                </select>
            </div>
        </div>

        <div id="online-config" class="hidden">
            <div class="input-group">
                <label for="microsoft-email" data-i18n="character.microsoft_email"></label>
                <input type="text" id="microsoft-email" data-i18n="character.microsoft_email" disabled>
            </div>

            <div id="profile-select-container" class="input-group hidden">
                <label for="profile-select" data-i18n="auth.select_profile"></label>
                <select id="profile-select" style="width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(20, 20, 20, 0.95); color: white; box-sizing: border-box; cursor: pointer;">
                </select>
            </div>

            <button id="logout-btn" class="btn-secondary" onclick="logoutMicrosoft()" style="margin-top: 10px; display: none;">
                <span data-i18n="auth.logout_microsoft"></span>
            </button>
        </div>

        <div id="status-message" class="status-message hidden"></div>

        <div class="button-group">
            <button id="cancel-btn" class="btn-secondary" onclick="window.simpmcAPI.closeCharacterWindow()" data-i18n="character.cancel"></button>
            <button id="auth-btn" class="btn-primary" onclick="startMicrosoftAuth()" style="display: none;" data-i18n="character.microsoft_email_login"></button>
            <button id="create-btn" class="btn-primary" onclick="createCharacter()" data-i18n="character.create_character"></button>
        </div>
    </div>

    <script>
        let currentCharacterType = 'offline';
        let microsoftUser = null;
        let microsoftProfiles = [];
        let editMode = false;
        let editingProfile = null;
        let availableSkins = [];

        window.addEventListener('DOMContentLoaded', async () => {
            applyTranslations();
            await loadSkins();
            window.simpmcAPI.onCharacterType((type) => {
                currentCharacterType = type;
                updateUI();
            });
            window.simpmcAPI.onCharacterEdit((profile) => {
                editMode = true;
                editingProfile = profile;
                document.getElementById('username').value = profile.name || '';
                if (profile.uuid) {
                    document.getElementById('offline-uuid').value = profile.uuid;
                }
                if (profile.skinId) {
                    document.getElementById('skin-select').value = profile.skinId;
                }
                document.querySelector('.title-bar span').textContent = i18n('settings.profile_management') || 'Edit Profile';
                document.getElementById('create-btn').textContent = i18n('character.save_character') || 'Save';
                document.getElementById('username').disabled = false;
                updateUI();
            });
        });

        async function loadSkins() {
            try {
                const data = await window.simpmcAPI.getWardrobe();
                availableSkins = data.skins || [];
                const skinSelect = document.getElementById('skin-select');
                let options = '<option value="">随机 (Steve/Alex)</option>';
                options += availableSkins.map(skin =>
                    `<option value="${skin.id}">${skin.name}</option>`
                ).join('');
                skinSelect.innerHTML = options;
            } catch (error) {
                console.error('Failed to load skins:', error);
            }
        }

        function updateUI() {
            const offlineBadge = document.getElementById('type-badge-offline');
            const onlineBadge = document.getElementById('type-badge-online');
            const offlineConfig = document.getElementById('offline-config');
            const onlineConfig = document.getElementById('online-config');
            const authBtn = document.getElementById('auth-btn');
            const createBtn = document.getElementById('create-btn');

            if (currentCharacterType === 'online') {
                offlineBadge.classList.add('hidden');
                onlineBadge.classList.remove('hidden');
                offlineConfig.classList.add('hidden');
                onlineConfig.classList.remove('hidden');
                authBtn.style.display = microsoftUser ? 'none' : 'block';
                createBtn.disabled = !microsoftUser;
            } else {
                offlineBadge.classList.remove('hidden');
                onlineBadge.classList.add('hidden');
                offlineConfig.classList.remove('hidden');
                onlineConfig.classList.add('hidden');
                authBtn.style.display = 'none';
                createBtn.disabled = false;
            }
        }

        function showStatus(message, type = '') {
            const statusEl = document.getElementById('status-message');
            statusEl.textContent = message;
            statusEl.className = 'status-message ' + type;
            statusEl.classList.remove('hidden');
        }

        function hideStatus() {
            const statusEl = document.getElementById('status-message');
            statusEl.classList.add('hidden');
        }

        async function startMicrosoftAuth() {
            const authBtn = document.getElementById('auth-btn');
            const createBtn = document.getElementById('create-btn');
            const emailInput = document.getElementById('microsoft-email');
            const profileSelect = document.getElementById('profile-select');
            const profileContainer = document.getElementById('profile-select-container');

            authBtn.disabled = true;
            authBtn.textContent = i18n('character.microsoft_email_login');
            showStatus(i18n('character.microsoft_email_login'), '');

            try {
                const result = await window.simpmcAPI.microsoftAuth();

                if (result.success) {
                    microsoftUser = result.user;
                    microsoftProfiles = result.profiles || [];

                    emailInput.value = microsoftUser.name || microsoftUser.id;

                    if (microsoftProfiles.length > 0) {
                        profileSelect.innerHTML = '';
                        microsoftProfiles.forEach((profile, index) => {
                            const option = document.createElement('option');
                            option.value = index;
                            option.textContent = profile.name || `角色 ${index + 1}`;
                            profileSelect.appendChild(option);
                        });
                        profileContainer.classList.remove('hidden');
                        } else {
                        showStatus('没有找到 Minecraft 角色', 'error');
                        authBtn.style.display = 'block';
                        authBtn.disabled = false;
                        authBtn.textContent = i18n('character.microsoft_email_login');
                        return;
                    }

                    showStatus('登录成功', 'success');
                    authBtn.style.display = 'none';
                    document.getElementById('logout-btn').style.display = 'block';
                    createBtn.disabled = false;
                } else {
                    showStatus('登录失败: ' + (result.error || '未知错误'), 'error');
                    authBtn.disabled = false;
                    authBtn.textContent = i18n('character.microsoft_email_login');
                }
            } catch (error) {
                showStatus('登录失败: ' + error.message, 'error');
                authBtn.disabled = false;
                authBtn.textContent = i18n('character.microsoft_email_login');
            }
        }

        function createCharacter() {
            if (currentCharacterType === 'offline') {
                createOfflineCharacter();
            } else if (currentCharacterType === 'online') {
                createOnlineCharacter();
            }
        }

        function generateOfflineUUID(username) {
            const randHex = () => Math.floor(Math.random() * 16).toString(16);
            return randHex() + randHex() + randHex() + randHex() + 
                randHex() + randHex() + '-' + 
                randHex() + randHex() + '-' + 
                randHex() + randHex() + '-' + 
                randHex() + randHex() + '-' + 
                randHex() + randHex() + randHex() + randHex() + randHex() + randHex();
        }

        function createOfflineCharacter() {
            const username = document.getElementById('username').value.trim();
            if (!username) {
                showStatus(i18n('auth.username_required'),  'error');
                return;
            }

            const characterData = {
                id: editMode ? editingProfile.id : username.toLowerCase().replace(/\s+/g, '_'),
                name: username,
                type: 'offline'
            };

            const uuid = document.getElementById('offline-uuid').value.trim();
            if (uuid) {
                characterData.uuid = uuid;
            } else {
                characterData.uuid = generateOfflineUUID(username);
            }

            const skinSelect = document.getElementById('skin-select');
            if (skinSelect && skinSelect.value) {
                characterData.skinId = skinSelect.value;
            }

            if (editMode) {
                window.simpmcAPI.updateProfile(characterData).then(() => {
                    window.simpmcAPI.closeCharacterWindow();
                });
            } else {
                window.simpmcAPI.createCharacter(characterData);
            }
        }

        function createOnlineCharacter() {
            if (!microsoftUser) {
                showStatus('请先登录微软账号',  'error');
                return;
            }

            const profileSelect = document.getElementById('profile-select');
            const profileContainer = document.getElementById('profile-select-container');

            let selectedProfile = null;
            if (profileContainer.classList.contains('hidden')) {
                selectedProfile = microsoftProfiles[0];
            } else {
                const selectedIndex = parseInt(profileSelect.value);
                selectedProfile = microsoftProfiles[selectedIndex];
            }

            if (!selectedProfile) {
                showStatus('请选择角色',  'error');
                return;
            }

            const characterData = {
                id: selectedProfile.id,
                name: selectedProfile.name,
                type: 'microsoft',
                uuid: selectedProfile.id,
                accessToken: selectedProfile.accessToken,
                microsoftUser: {
                    id: microsoftUser.id,
                    name: microsoftUser.name
                }
            };

            window.simpmcAPI.createCharacter(characterData);
        }

        function logoutMicrosoft() {
            microsoftUser = null;
            microsoftProfiles = [];
            document.getElementById('microsoft-email').value = '';
            document.getElementById('profile-select').innerHTML = '';
            document.getElementById('profile-select-container').classList.add('hidden');
            document.getElementById('logout-btn').style.display = 'none';
            document.getElementById('auth-btn').style.display = 'block';
            document.getElementById('auth-btn').disabled = false;
            document.getElementById('create-btn').disabled = true;
            hideStatus();
        }
    </script>
</body>
</html>
