<style>
    .about-container {
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
    }
    .about-header {
        text-align: center;
        padding: 30px 0;
    }
    .about-logo {
        width: 100px;
        height: 100px;
        margin-bottom: 20px;
    }
    .about-title {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 5px;
    }
    .about-version {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 10px;
    }
    .about-desc {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.8);
        line-height: 1.6;
    }
    .about-section {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 15px;
    }
    .about-section-title {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 12px;
        color: #4facfe;
    }
    .about-links {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .about-link-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.3s;
    }
    .about-link-item:hover {
        background: rgba(255, 255, 255, 0.1);
    }
    .about-link-item svg {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
    }
    .about-link-text {
        flex: 1;
    }
    .about-link-label {
        font-size: 14px;
        font-weight: 500;
    }
    .about-link-url {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
    }
    .about-credit-item {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .about-credit-item:last-child {
        border-bottom: none;
    }
    .about-credit-item.contributor {
        align-items: center;
        gap: 10px;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.3s;
    }
    .about-credit-item.contributor:hover {
        background: rgba(255, 255, 255, 0.05);
    }
    .contributor-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
    }
    .contributor-info {
        flex: 1;
    }
    .about-credit-name {
        font-size: 14px;
    }
    .contributor-contributions {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
    }
    .about-credit-role {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
    }
    .about-tech-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.3s;
    }
    .about-tech-item:hover {
        background: rgba(255, 255, 255, 0.05);
    }
    .about-tech-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }
    .about-tech-name {
        font-size: 14px;
    }
    .back-btn {
        position: absolute;
        top: 0;
        left: 0;
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.1);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s;
    }
    .back-btn:hover {
        background: rgba(255, 255, 255, 0.2);
    }
    .back-btn img {
        width: 20px;
        height: 20px;
        filter: brightness(0) invert(1);
    }
    .page-header {
        position: relative;
        height: 40px;
        padding: 0 0 0 50px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
    }
    .page-header h1 {
        text-align: left;
        margin: 0;
        line-height: 40px;
    }
</style>

</div>
