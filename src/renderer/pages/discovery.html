<style>
    .info-bg {
        background: rgba(0, 74, 234, 0.15);
        padding: 20px;
        border-radius: 12px;
        margin: 20px 0;
        border-left: 5px solid #1976D2;
        backdrop-filter: blur(8px);
        box-shadow: 0 4px 12px rgba(0, 118, 210, 0.2);
    }

    .info-title {
        font-size: 16px;
        font-weight: 600;
        color: #6db3f2;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .info-text {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.5;
        margin: 0;
    }

    .info-icon {
        width: 24px;
        height: 24px;
        opacity: 0.8;
    }

    .carousel-container {
        position: relative;
        width: 100%;
        height: 200px;
        border-radius: 12px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 4px 12px rgba(0, 118, 210, 0.2);
    }

    .carousel-track {
        display: flex;
        height: 100%;
        transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .carousel-slide {
        min-width: 100%;
        height: 100%;
        position: relative;
        cursor: pointer;
    }

    .carousel-slide.no-link {
        cursor: default;
    }

    .carousel-image {
        width: 100%;
        height: 100%;
        overflow: hidden;
    }

    .carousel-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease;
    }

    .carousel-slide:hover .carousel-image img {
        transform: scale(1.05);
    }

    .carousel-content {
        position: absolute;
        bottom: -100px;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
        padding: 50px 20px 20px;
        transition: bottom 0.3s ease;
        backdrop-filter: blur(4px);
        box-sizing: border-box;
        height: 100px;
        border-radius: 8px;
    }

    .carousel-slide:hover .carousel-content {
        bottom: 0;
    }

    .carousel-title {
        font-size: 14px;
        font-weight: 600;
        color: white;
        margin-bottom: 4px;
    }

    .carousel-desc {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.8);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        border-radius: 8px;
    }

    .carousel-dots {
        position: absolute;
        bottom: 12px;
        right: 20px;
        display: flex;
        gap: 8px;
        z-index: 10;
    }

    .carousel-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .carousel-dot.active {
        background: white;
        transform: scale(1.2);
    }

    .carousel-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(4px);
        border: none;
        color: white;
        font-size: 18px;
        cursor: pointer;
        opacity: 0;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
    }

    .carousel-container:hover .carousel-arrow {
        opacity: 1;
    }

    .carousel-arrow:hover {
        background: rgba(255, 255, 255, 0.3);
    }

    .carousel-arrow.prev {
        left: 12px;
    }

    .carousel-arrow.next {
        right: 12px;
    }

    .carousel-loading, .carousel-error {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
        z-index: 5;
    }

    .carousel-error {
        color: rgba(255, 100, 100, 0.8);
    }

    .widgets-store {
        margin-top: 20px;
        padding: 14px;
        border-radius: 8px;
        overflow: hidden;
        background-color: #2c80d4;
        color: white;
        transition: padding 0.3s ease, background-color 0.3s ease;
        cursor: pointer;
    }

    .widgets-store:hover {
        padding: 18px;
        background-color: #639dd7;
    }

    .widgets-store-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
    }

    .widgets-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 1;
    }

    .widgets_description {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.8);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .widgets_img {
        width: 24px;
        height: 24px;
        filter: brightness(0) invert(1);
    }
</style>

<div class="page-header">
    <h1 data-i18n="discovery.title"></h1>
</div>

<div class="page-body">
    <div class="carousel-container" id="carousel-container">
        <div class="carousel-track" id="carousel-track"></div>
        <button class="carousel-arrow prev" onclick="carouselPrev()">‹</button>
        <button class="carousel-arrow next" onclick="carouselNext()">›</button>
        <div class="carousel-dots" id="carousel-dots"></div>
        <div class="carousel-loading" id="carousel-loading" data-i18n="common.loading">加载中...</div>
    </div>

    <div class="info-bg">
        <div class="info-title">
            <svg class="info-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
            </svg>
            <span data-i18n="discovery.info.title"></span>
        </div>
        <p class="info-text" data-i18n="discovery.info.description"></p>
    </div>

    <div class="widgets-store" onclick="switchPage('widgets')">
        <div class="widgets-store-title">
            <div class="widgets-text">
                <span data-i18n="discovery.widgets.title"></span>
                <span data-i18n="discovery.widgets.description" class="widgets_description"></span>
            </div>
            <img src="../assets/icon/arrow-right-solid-full.svg" alt="widgets" class="widgets_img">
        </div>
    </div>
</div>
