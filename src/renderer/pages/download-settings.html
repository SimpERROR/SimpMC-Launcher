<style>
.download-settings-section {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 0 20px;
}

.setting-group {
    background: rgba(40, 40, 40, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

.setting-label {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.8);
    margin-bottom: 8px;
    display: block;
}

.setting-input {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.05);
    color: white;
    box-sizing: border-box;
    margin-bottom: 12px;
}

.setting-input:focus {
    outline: none;
    border-color: #1976D2;
}

.setting-input:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.setting-select {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.05);
    color: white;
    box-sizing: border-box;
    margin-bottom: 12px;
    cursor: pointer;
}

.setting-select:focus {
    outline: none;
    border-color: #1976D2;
}

.setting-select option {
    background: #2a2a2a;
    color: white;
}

.setting-hint {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 16px;
    line-height: 1.5;
}

.setting-row {
    display: flex;
    gap: 12px;
    align-items: center;
}

.setting-row .setting-input {
    flex: 1;
    margin-bottom: 12px;
}

.setting-buttons {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 20px;
}

.setting-btn {
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
}

.setting-btn.cancel {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
}

.setting-btn.cancel:hover {
    background: rgba(255, 255, 255, 0.2);
}

.setting-btn.confirm {
    background: #1976D2;
    border: none;
    color: white;
}

.setting-btn.confirm:hover {
    background: #1565C0;
}

.setting-btn.secondary {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
}

.setting-btn.secondary:hover {
    background: rgba(255, 255, 255, 0.2);
}

.back-btn {
    position: absolute;
    top: 0;
    left: 0;
    width: 40px;
    height: 40px;
    background: rgba(255, 255, 255, 0.1);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s;
}

.back-btn:hover {
    background: rgba(255, 255, 255, 0.2);
}

.back-btn img {
    width: 20px;
    height: 20px;
    filter: brightness(0) invert(1);
}

.page-header {
    position: relative;
    height: 40px;
    padding: 0 0 0 50px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
}

.page-header h1 {
    text-align: left;
    margin: 0;
    line-height: 40px;
}

.save-status {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(26, 92, 45, 0.95);
    border: 1px solid rgba(13, 43, 24, 0.2);
    border-radius: 8px;
    padding: 12px 20px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 1000;
}

.save-status.show {
    transform: translateY(0);
    opacity: 1;
}

.save-status.error {
    border-color: #f44336;
    background: rgba(244, 67, 54, 0.1);
}

.save-message {
    font-size: 14px;
    color: white;
}
</style>

<div class="page-header">
    <button class="back-btn" onclick="switchPage('settings')">
        <img src="../assets/icon/arrow-left-solid-full.svg" alt="Back">
    </button>
    <h1 data-i18n="settings.download_settings"></h1>
</div><br>
<div class="page-body">
    <div class="download-settings-section">
        <div class="setting-group">
            <label class="setting-label" data-i18n="settings.install_path">游戏安装目录</label>
            <div class="setting-row">
                <input type="text" class="setting-input" id="install-path-input" readonly>
                <button class="setting-btn secondary" onclick="selectInstallPath()">浏览</button>
            </div>
            <p class="setting-hint" data-i18n="settings.install_path_hint">Minecraft 版本和资源文件将安装到此目录</p>
        </div>
        
        <div class="setting-group">
            <label class="setting-label" data-i18n="settings.download_source">默认下载源</label>
            <select class="setting-select" id="download-source-select" onchange="saveDownloadSettings()">
                <option value="official">官方源</option>
                <option value="bmclapi">BMCLAPI 源</option>
            </select>
            <p class="setting-hint" data-i18n="settings.download_source_hint">BMCLAPI 源在国内下载速度更快</p>
        </div>
        
        <div class="setting-group">
            <label class="setting-label" data-i18n="settings.concurrent_downloads">并发下载数</label>
            <select class="setting-select" id="concurrent-downloads-select" onchange="saveDownloadSettings()">
                <option value="1">1 (最慢)</option>
                <option value="2">2 (推荐)</option>
                <option value="3">3 (较快)</option>
                <option value="4">4 (最快)</option>
            </select>
            <p class="setting-hint" data-i18n="settings.concurrent_downloads_hint">更高的并发数下载更快，但可能导致下载失败</p>
        </div>
        
        <div class="setting-group">
            <label class="setting-label" data-i18n="settings.max_retries">最大重试次数</label>
            <select class="setting-select" id="max-retries-select" onchange="saveDownloadSettings()">
                <option value="1">1 次</option>
                <option value="3">3 次</option>
                <option value="5">5 次 (推荐)</option>
                <option value="10">10 次</option>
            </select>
            <p class="setting-hint" data-i18n="settings.max_retries_hint">下载失败时自动重试的次数</p>
        </div>
        
        <div id="save-status" class="save-status">
            <span id="save-message" class="save-message">设置已保存</span>
        </div>
    </div>
</div>
