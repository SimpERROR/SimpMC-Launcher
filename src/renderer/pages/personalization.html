<style>
.personalization-section {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 0 20px;
}

.setting-group {
    background: rgba(40, 40, 40, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

.setting-label {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.8);
    margin-bottom: 8px;
    display: block;
}

.setting-input {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.05);
    color: white;
    box-sizing: border-box;
    margin-bottom: 12px;
}

.setting-input:focus {
    outline: none;
    border-color: #1976D2;
}

.setting-hint {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 16px;
    line-height: 1.5;
}

.setting-buttons {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 20px;
}

.setting-btn {
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
}

.setting-btn.cancel {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
}

.setting-btn.cancel:hover {
    background: rgba(255, 255, 255, 0.2);
}

.setting-btn.confirm {
    background: #1976D2;
    border: none;
    color: white;
}

.setting-btn.confirm:hover {
    background: #1565C0;
}

.back-btn {
    position: absolute;
    top: 0;
    left: 0;
    width: 40px;
    height: 40px;
    background: rgba(255, 255, 255, 0.1);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s;
}

.back-btn:hover {
    background: rgba(255, 255, 255, 0.2);
}

.back-btn img {
    width: 20px;
    height: 20px;
    filter: brightness(0) invert(1);
}

.page-header {
    position: relative;
    height: 40px;
    padding: 0 0 0 50px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
}

.page-header h1 {
    text-align: left;
    margin: 0;
    line-height: 40px;
}

.save-status {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(26, 92, 45, 0.95);
    border: 1px solid rgba(13, 43, 24, 0.2);
    border-radius: 8px;
    padding: 12px 20px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 1000;
}

.save-status.show {
    transform: translateY(0);
    opacity: 1;
}

.save-status.error {
    border-color: #f44336;
    background: rgba(244, 67, 54, 0.1);
}

.save-message {
    font-size: 14px;
    color: white;
}

.music-control {
    display: flex;
    align-items: center;
    gap: 15px;
}

.music-toggle {
    position: relative;
    width: 50px;
    height: 26px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 13px;
    cursor: pointer;
    transition: background 0.3s;
    flex-shrink: 0;
}

.music-toggle.active {
    background: rgba(25, 118, 210, 0.8);
}

.music-toggle::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    transition: transform 0.3s;
}

.music-toggle.active::after {
    transform: translateX(24px);
}

.music-volume {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
}

.volume-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
}

.volume-icon img {
    width: 100%;
    height: 100%;
    filter: brightness(0) invert(1);
    opacity: 0.7;
}

.volume-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
    outline: none;
}

.volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    background: #1976D2;
    border-radius: 50%;
    cursor: pointer;
    transition: background 0.3s;
}

.volume-slider::-webkit-slider-thumb:hover {
    background: #1565C0;
}

.music-info {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 8px;
    margin-top: 12px;
}

.music-info-icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
}

.music-info-icon img {
    width: 100%;
    height: 100%;
    filter: brightness(0) invert(1);
    opacity: 0.7;
}

.music-info-text {
    flex: 1;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.7);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.music-info-text.playing {
    color: #4CAF50;
}

.skip-btn {
    width: 32px;
    height: 32px;
    background: rgba(255, 255, 255, 0.1);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s;
    flex-shrink: 0;
}

.skip-btn:hover {
    background: rgba(255, 255, 255, 0.2);
}

.skip-btn img {
    width: 16px;
    height: 16px;
    filter: brightness(0) invert(1);
}
</style>

<div class="page-header">
    <button class="back-btn" onclick="switchPage('settings')">
        <img src="../assets/icon/arrow-left-solid-full.svg" alt="Back">
    </button>
    <h1 data-i18n="settings.personalization"></h1>
</div><br>
<div class="page-body">
    <div class="personalization-section">
        <div class="setting-group">
            <label class="setting-label" data-i18n="settings.display_name">显示名称</label>
            <input type="text" class="setting-input" id="display-name-input" maxlength="20" onchange="saveDisplayName()">
            <p class="setting-hint" data-i18n="settings.display_name_desc">设置主页问候语中显示的名称</p>
        </div>
        
        <div class="setting-group">
            <label class="setting-label" data-i18n="settings.background_music">背景音乐</label>
            <div class="music-control">
                <div class="music-toggle" id="music-toggle" onclick="toggleMusic()"></div>
                <span data-i18n="settings.music_enabled">音乐开关</span>
            </div>
            <div class="music-volume" style="margin-top: 15px;">
                <div class="volume-icon">
                    <img src="../assets/icon/volume-high-solid-full.svg" alt="">
                </div>
                <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="50" onchange="setMusicVolume(this.value)">
            </div>
            <div class="music-info" id="music-info">
                <div class="music-info-icon">
                    <img src="../assets/icon/music-solid-full.svg" alt="">
                </div>
                <span class="music-info-text" id="music-info-text" data-i18n="settings.no_music_playing">暂无音乐播放</span>
                <button class="skip-btn" onclick="skipToNextMusic()">
                    <img src="../assets/icon/forward-step-solid-full.svg" alt="">
                </button>
            </div>
            <p class="setting-hint" data-i18n="settings.music_hint">音乐文件应放置在 SimpMC/music 目录下</p>
        </div>
        
        <div id="save-status" class="save-status">
            <span id="save-message" class="save-message">设置已保存</span>
        </div>
    </div>
</div>
