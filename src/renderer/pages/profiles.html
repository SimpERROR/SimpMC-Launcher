<style>
.profile-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
}
.profile-add-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: rgba(25, 118, 210, 0.9);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
}
.profile-add-btn:hover {
    background: rgba(25, 118, 210, 1);
    transform: translateY(-2px);
}
.profile-add-btn img {
    width: 16px;
    height: 16px;
    filter: brightness(0) invert(1);
}
.profile-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.profile-card {
    display: flex;
    align-items: center;
    padding: 15px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    transition: all 0.3s;
}
.profile-card:hover {
    background: rgba(255, 255, 255, 0.08);
}
.profile-avatar {
    width: 50px;
    height: 50px;
    border-radius: 8px;
    background: rgba(25, 118, 210, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 15px;
    font-size: 24px;
}
.profile-info {
    flex: 1;
}
.profile-name {
    font-size: 16px;
    font-weight: 600;
    color: white;
    margin-bottom: 4px;
}
.profile-type {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.6);
}
.profile-actions {
    display: flex;
    gap: 8px;
}
.profile-action-btn {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
}
.profile-action-btn img {
    width: 16px;
    height: 16px;
    filter: brightness(0) invert(1);
}
.profile-action-btn.delete {
    background: rgba(244, 67, 54, 0.8);
}
.profile-action-btn.delete:hover {
    background: rgba(244, 67, 54, 1);
}
.profile-action-btn.launch {
    background: rgba(76, 175, 80, 0.8);
}
.profile-action-btn.launch:hover {
    background: rgba(76, 175, 80, 1);
}
.profile-action-btn.edit {
    background: rgba(25, 118, 210, 0.8);
}
.profile-action-btn.edit:hover {
    background: rgba(25, 118, 210, 1);
}
.empty-state {
    text-align: center;
    padding: 40px 20px;
    color: rgba(255, 255, 255, 0.6);
}
.empty-state-icon {
    font-size: 48px;
    margin-bottom: 16px;
}
.back-btn {
    position: absolute;
    top: 0;
    left: 0;
    width: 40px;
    height: 40px;
    background: rgba(255, 255, 255, 0.1);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s;
}
.back-btn:hover {
    background: rgba(255, 255, 255, 0.2);
}
.back-btn img {
    width: 20px;
    height: 20px;
    filter: brightness(0) invert(1);
}
.page-header {
    position: relative;
    height: 40px;
    padding: 0 0 0 50px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
}
.page-header h1 {
    text-align: left;
    margin: 0;
    line-height: 40px;
}
</style>

<div class="page-header">
    <button class="back-btn" onclick="switchPage('settings')">
        <img src="../assets/icon/arrow-left-solid-full.svg" alt="Back">
    </button>
    <h1 data-i18n="settings.profile_management"></h1>
</div>
<div class="page-body">
    <div class="profile-header">
        <div style="display: flex; gap: 10px; align-items: center;">
            <select id="profile-type-select" style="padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(20, 20, 20, 0.95); color: white; outline: none; cursor: pointer;">
                <option value="offline" data-i18n="auth.offline_character" style="background: #1a1a1a;">离线账户</option>
                <option value="online" data-i18n="auth.official_character" style="background: #1a1a1a;">微软账户</option>
            </select>
            <button class="profile-add-btn" onclick="addNewProfile()">
                <img src="../assets/icon/plus-solid-full.svg" alt="">
                <span data-i18n="profile.add"></span>
            </button>
        </div>
    </div>
    <div class="profile-list" id="profile-list">
        <div class="empty-state">
            <div class="empty-state-icon">📁</div>
            <p data-i18n="profile.empty"></p>
        </div>
    </div>
</div>
