<style>
.settings-section {
    display: flex;
    flex-direction: column;
    align-items: left;
    justify-content: flex-start;
    gap: 15px;
    padding-bottom: 20px;
}
.settings-card {
    display: flex;
    align-items: center;
    padding: 15px 20px;
    background: rgba(25, 118, 210, 0.8);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}
.settings-card:hover {
    background: rgba(25, 118, 210, 1);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
}
.settings-card:active {
    transform: translateY(0);
}
.settings-card-icon {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 15px;
    flex-shrink: 0;
}
.settings-card-icon img {
    width: 24px;
    height: 24px;
    filter: brightness(0) invert(1);
    opacity: 1;
}
.settings-card-content {
    flex: 1;
}
.settings-card-content h3 {
    margin: 0 0 4px 0;
    font-size: 15px;
    font-weight: 600;
    color: white;
}
.settings-card-content p {
    margin: 0;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.8);
}
.hidden {
    display: none !important;
}
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}
.modal-content {
    background: rgba(40, 40, 40, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    padding: 24px;
    width: 450px;
    max-width: 90%;
    max-height: 90vh;
    overflow-y: auto;
}
.modal-title {
    font-size: 18px;
    font-weight: 600;
    color: white;
    margin-bottom: 20px;
}
.modal-input {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.05);
    color: white;
    box-sizing: border-box;
    margin-bottom: 16px;
}
.modal-input:focus {
    outline: none;
    border-color: #1976D2;
}
.modal-input:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
.modal-select {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.05);
    color: white;
    box-sizing: border-box;
    margin-bottom: 16px;
    cursor: pointer;
}
.modal-select:focus {
    outline: none;
    border-color: #1976D2;
}
.modal-select option {
    background: #2a2a2a;
    color: white;
}
.modal-label {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.8);
    margin-bottom: 8px;
    display: block;
}
.modal-hint {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 16px;
    line-height: 1.5;
}
.modal-buttons {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 20px;
}
.modal-btn {
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
}
.modal-btn.cancel {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
}
.modal-btn.cancel:hover {
    background: rgba(255, 255, 255, 0.2);
}
.modal-btn.confirm {
    background: #1976D2;
    border: none;
    color: white;
}
.modal-btn.confirm:hover {
    background: #1565C0;
}
.modal-btn.secondary {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
}
.modal-btn.secondary:hover {
    background: rgba(255, 255, 255, 0.2);
}
.modal-row {
    display: flex;
    gap: 12px;
    align-items: center;
}
.modal-row .modal-input {
    flex: 1;
    margin-bottom: 16px;
}
</style>

<div class="page-header">
    <h1 data-i18n="settings.title"></h1>
</div>
<div class="page-body">
    <div class="settings-section">
        <div class="settings-card" onclick="switchPage('download-settings')">
            <div class="settings-card-icon">
                <img src="../assets/icon/download-solid-full.svg" alt="">
            </div>
            <div class="settings-card-content">
                <h3 data-i18n="settings.download_settings">下载设置</h3>
                <p data-i18n="settings.download_settings_desc">管理游戏安装目录、下载并发数等</p>
            </div>
        </div>

        <div class="settings-card" onclick="switchPage('personalization')">
            <div class="settings-card-icon">
                <img src="../assets/icon/palette-solid-full.svg" alt="">
            </div>
            <div class="settings-card-content">
                <h3 data-i18n="settings.personalization">个性化</h3>
                <p data-i18n="settings.personalization_desc">自定义启动器外观和显示设置</p>
            </div>
        </div>

        <div class="settings-card" onclick="openProfileManagement()">
            <div class="settings-card-icon">
                <img src="../assets/icon/user-solid-full.svg" alt="">
            </div>
            <div class="settings-card-content">
                <h3 data-i18n="settings.profile_management"></h3>
                <p data-i18n="settings.profile_management_desc"></p>
            </div>
        </div>

        <div class="settings-card" onclick="openLanguageSelection()">
            <div class="settings-card-icon">
                <img src="../assets/icon/language-solid-full.svg" alt="">
            </div>
            <div class="settings-card-content">
                <h3 data-i18n="settings.language"></h3>
                <p data-i18n="settings.language_desc"></p>
            </div>
        </div>

        <div class="settings-card" onclick="showOnboardingAgain()">
            <div class="settings-card-icon">
                <img src="../assets/icon/arrow-rotate-left-solid-full.svg" alt="">
            </div>
            <div class="settings-card-content">
                <h3 data-i18n="settings.show_guide"></h3>
                <p data-i18n="settings.show_guide_desc"></p>
            </div>
        </div>
    </div>
</div>
