<style>
.settings-section {
    display: flex;
    flex-direction: column;
    align-items: left;
    justify-content: flex-start;
    gap: 15px;
    padding-bottom: 20px;
}
.settings-card {
    display: flex;
    align-items: center;
    padding: 15px 20px;
    background: rgba(25, 118, 210, 0.8);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}
.settings-card:hover {
    background: rgba(25, 118, 210, 1);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
}
.settings-card:active {
    transform: translateY(0);
}
.settings-card-icon {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 15px;
    flex-shrink: 0;
}
.settings-card-icon img {
    width: 24px;
    height: 24px;
    filter: brightness(0) invert(1);
    opacity: 1;
}
.settings-card-content {
    flex: 1;
}
.settings-card-content h3 {
    margin: 0 0 4px 0;
    font-size: 15px;
    font-weight: 600;
    color: white;
}
.settings-card-content p {
    margin: 0;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.8);
}
.hidden {
    display: none !important;
}
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}
.modal-content {
    background: rgba(40, 40, 40, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    padding: 24px;
    width: 450px;
    max-width: 90%;
    max-height: 90vh;
    overflow-y: auto;
}
.modal-title {
    font-size: 18px;
    font-weight: 600;
    color: white;
    margin-bottom: 20px;
}
.modal-input {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.05);
    color: white;
    box-sizing: border-box;
    margin-bottom: 16px;
}
.modal-input:focus {
    outline: none;
    border-color: #1976D2;
}
.modal-input:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
.modal-select {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.05);
    color: white;
    box-sizing: border-box;
    margin-bottom: 16px;
    cursor: pointer;
}
.modal-select:focus {
    outline: none;
    border-color: #1976D2;
}
.modal-select option {
    background: #2a2a2a;
    color: white;
}
.modal-label {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.8);
    margin-bottom: 8px;
    display: block;
}
.modal-hint {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 16px;
    line-height: 1.5;
}
.modal-buttons {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 20px;
}
.modal-btn {
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
}
.modal-btn.cancel {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
}
.modal-btn.cancel:hover {
    background: rgba(255, 255, 255, 0.2);
}
.modal-btn.confirm {
    background: #1976D2;
    border: none;
    color: white;
}
.modal-btn.confirm:hover {
    background: #1565C0;
}
.modal-btn.secondary {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
}
.modal-btn.secondary:hover {
    background: rgba(255, 255, 255, 0.2);
}
.modal-row {
    display: flex;
    gap: 12px;
    align-items: center;
}
.modal-row .modal-input {
    flex: 1;
    margin-bottom: 16px;
}
</style>

<div class="page-header">
    <h1 data-i18n="settings.title"></h1>
</div>
<div class="page-body">
    <div class="settings-section">
        <div class="settings-card" onclick="openDownloadSettingsModal()">
            <div class="settings-card-icon">
                <img src="../assets/icon/download-solid-full.svg" alt="">
            </div>
            <div class="settings-card-content">
                <h3 data-i18n="settings.download_settings">下载设置</h3>
                <p data-i18n="settings.download_settings_desc">管理游戏安装目录、下载并发数等</p>
            </div>
        </div>

        <div class="settings-card" onclick="openDisplayNameModal()">
            <div class="settings-card-icon">
                <img src="../assets/icon/display-solid-full.svg" alt="">
            </div>
            <div class="settings-card-content">
                <h3 data-i18n="settings.display_name"></h3>
                <p data-i18n="settings.display_name_desc"></p>
            </div>
        </div>

        <div class="settings-card" onclick="openProfileManagement()">
            <div class="settings-card-icon">
                <img src="../assets/icon/user-solid-full.svg" alt="">
            </div>
            <div class="settings-card-content">
                <h3 data-i18n="settings.profile_management"></h3>
                <p data-i18n="settings.profile_management_desc"></p>
            </div>
        </div>

        <div class="settings-card" onclick="openLanguageSelection()">
            <div class="settings-card-icon">
                <img src="../assets/icon/language-solid-full.svg" alt="">
            </div>
            <div class="settings-card-content">
                <h3 data-i18n="settings.language"></h3>
                <p data-i18n="settings.language_desc"></p>
            </div>
        </div>

        <div class="settings-card" onclick="showOnboardingAgain()">
            <div class="settings-card-icon">
                <img src="../assets/icon/arrow-rotate-left-solid-full.svg" alt="">
            </div>
            <div class="settings-card-content">
                <h3 data-i18n="settings.show_guide"></h3>
                <p data-i18n="settings.show_guide_desc"></p>
            </div>
        </div>
    </div>
</div>

<div id="display-name-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <div class="modal-title" data-i18n="settings.display_name"></div>
        <input type="text" class="modal-input" id="display-name-input" maxlength="20">
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeDisplayNameModal()" data-i18n="common.cancel"></button>
            <button class="modal-btn confirm" onclick="saveDisplayName()" data-i18n="common.confirm"></button>
        </div>
    </div>
</div>

<div id="download-settings-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <div class="modal-title" data-i18n="settings.download_settings">下载设置</div>
        
        <label class="modal-label" data-i18n="settings.install_path">游戏安装目录</label>
        <div class="modal-row">
            <input type="text" class="modal-input" id="install-path-input-settings" readonly>
            <button class="modal-btn secondary" onclick="selectInstallPathSettings()">浏览</button>
        </div>
        <p class="modal-hint" data-i18n="settings.install_path_hint">Minecraft 版本和资源文件将安装到此目录</p>
        
        <label class="modal-label" data-i18n="settings.download_source">默认下载源</label>
        <select class="modal-select" id="download-source-select">
            <option value="official">官方源</option>
            <option value="bmclapi">BMCLAPI 源</option>
        </select>
        <p class="modal-hint" data-i18n="settings.download_source_hint">BMCLAPI 源在国内下载速度更快</p>
        
        <label class="modal-label" data-i18n="settings.concurrent_downloads">并发下载数</label>
        <select class="modal-select" id="concurrent-downloads-select">
            <option value="1">1 (最慢)</option>
            <option value="2">2 (推荐)</option>
            <option value="3">3 (较快)</option>
            <option value="4">4 (最快)</option>
        </select>
        <p class="modal-hint" data-i18n="settings.concurrent_downloads_hint">更高的并发数下载更快，但可能导致下载失败</p>
        
        <label class="modal-label" data-i18n="settings.max_retries">最大重试次数</label>
        <select class="modal-select" id="max-retries-select">
            <option value="1">1 次</option>
            <option value="3">3 次</option>
            <option value="5">5 次 (推荐)</option>
            <option value="10">10 次</option>
        </select>
        <p class="modal-hint" data-i18n="settings.max_retries_hint">下载失败时自动重试的次数</p>
        
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeDownloadSettingsModal()" data-i18n="common.cancel">取消</button>
            <button class="modal-btn confirm" onclick="saveDownloadSettings()" data-i18n="common.confirm">保存</button>
        </div>
    </div>
</div>
