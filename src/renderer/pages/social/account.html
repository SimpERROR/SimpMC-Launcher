<style>
    .account-container {
        padding: 20px;
        color: white;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .section {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
    }

    .section-title {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 15px;
        color: rgba(255, 255, 255, 0.9);
    }

    .user-info {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 15px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
    }

    .user-avatar {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        object-fit: cover;
    }

    .user-details {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .username {
        font-size: 18px;
        font-weight: bold;
    }

    .qq-display {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
    }

    .input-group {
        margin-bottom: 15px;
    }

    .input-group label {
        display: block;
        font-size: 13px;
        margin-bottom: 8px;
        color: rgba(255, 255, 255, 0.7);
    }

    .input-group input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        color: white;
        font-size: 14px;
        box-sizing: border-box;
        transition: all 0.3s ease;
    }

    .input-group input:focus {
        outline: none;
        border-color: rgb(29, 115, 201);
        background: rgba(255, 255, 255, 0.1);
    }

    .btn-submit {
        width: 100%;
        padding: 14px;
        background-color: rgb(29, 115, 201);
        color: #ffffff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-submit:hover {
        background-color: #92ccff;
        box-shadow: 0 4px 15px rgba(126, 187, 240, 0.3);
    }

    .btn-submit:disabled {
        background-color: rgba(255, 255, 255, 0.2);
        cursor: not-allowed;
    }

    .danger-zone {
        border: 1px solid rgba(255, 59, 48, 0.3);
        background: rgba(255, 59, 48, 0.05);
    }

    .danger-zone .section-title {
        color: #ff3b30;
    }

    .btn-danger {
        width: 100%;
        padding: 14px;
        background-color: #ff3b30;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-danger:hover {
        background-color: #ff6961;
    }

    .btn-danger:disabled {
        background-color: rgba(255, 59, 48, 0.3);
        cursor: not-allowed;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 15px;
        color: rgba(255, 255, 255, 0.6);
        text-decoration: none;
        cursor: pointer;
    }

    .back-link:hover {
        color: rgba(255, 255, 255, 0.9);
    }

    .success {
        background-color: rgb(33, 129, 16) !important;
    }

    .error {
        background-color: #901212 !important;
    }

    .status-message {
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
        text-align: center;
        font-size: 14px;
        display: none;
    }

    .status-message.success {
        background-color: rgba(33, 129, 16, 0.2);
        color: #4cd964;
        display: block;
    }

    .status-message.error {
        background-color: rgba(255, 59, 48, 0.2);
        color: #ff3b30;
        display: block;
    }
</style>

<div class="account-container">
    <div class="page-header">
        <h1 data-i18n="social.account_title"></h1>
    </div>

    <div class="page-body">
        <div class="section">
            <div class="section-title" data-i18n="social.account_info"></div>
            <div class="user-info">
                <img class="user-avatar" id="user_avatar" src="../assets/default_avatar.jpg" alt="avatar">
                <div class="user-details">
                    <span class="username" id="username">-</span>
                    <span class="qq-display" id="qq_display" data-i18n="social.qq_not_bound"></span>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title" data-i18n="social.bind_qq"></div>
            <div class="status-message" id="qq_status"></div>
            <form id="qqForm">
                <div class="input-group">
                    <label data-i18n="social.qq_number"></label>
                    <input type="text" id="qq_input" placeholder="12345678" pattern="[0-9]{5,11}" required>
                </div>
                <button type="submit" class="btn-submit" data-i18n="social.save_qq"></button>
            </form>
        </div>

        <div class="section danger-zone">
            <div class="section-title" data-i18n="social.danger_zone"></div>
            <div class="status-message" id="delete_status"></div>
            <form id="deleteForm">
                <div class="input-group">
                    <label data-i18n="social.confirm_password"></label>
                    <input type="password" id="delete_password" required>
                </div>
                <button type="submit" class="btn-danger" data-i18n="social.delete_account"></button>
            </form>
        </div>

        <a class="back-link" onclick="switchPage('social')" data-i18n="social.back"></a><br><br>
    </div>
</div>
