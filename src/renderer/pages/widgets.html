<style>
    .page-header {
        position: relative;
        height: 40px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        padding-left: 50px;
    }
    .page-header h1 {
        text-align: left;
        margin: 0;
        line-height: 40px;
    }
    .back-btn {
        position: absolute;
        top: 0;
        left: 0;
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.1);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s;
    }
    .back-btn:hover {
        background: rgba(255, 255, 255, 0.2);
    }
    .back-btn img {
        width: 20px;
        height: 20px;
        filter: brightness(0) invert(1);
    }

    .page-body {
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .widgets-section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
    }

    .section-title {
        font-size: 18px;
        font-weight: 600;
        color: white;
        margin: 0;
    }

    .add-widget-btn {
        padding: 10px 20px;
        background: linear-gradient(135deg, #1976D2 0%, #1565C0 100%);
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .add-widget-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(25, 118, 210, 0.4);
    }

    .widgets-installed-section {
        margin-bottom: 40px;
    }

    .installed-widgets-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
        margin-top: 16px;
    }

    .installed-widget-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 16px;
        transition: all 0.3s;
        cursor: grab;
        position: relative;
    }

    .installed-widget-card:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
    }

    .installed-widget-card.dragging {
        opacity: 0.5;
        transform: scale(0.95);
    }

    .installed-widget-card.drag-over {
        border-color: #1976D2;
        border-style: dashed;
        background: rgba(25, 118, 210, 0.1);
    }

    .installed-widget-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
    }

    .installed-widget-info {
        flex: 1;
    }

    .installed-widget-name {
        font-size: 15px;
        font-weight: 600;
        color: white;
        margin-bottom: 4px;
    }

    .installed-widget-size {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .size-badge {
        padding: 2px 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        font-size: 11px;
    }

    .installed-widget-actions {
        display: flex;
        gap: 4px;
    }

    .widget-action-btn {
        width: 28px;
        height: 28px;
        border: none;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.7);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        transition: all 0.2s;
    }

    .widget-action-btn:hover {
        background: rgba(255, 255, 255, 0.2);
        color: white;
    }

    .widget-action-btn.delete:hover {
        background: rgba(244, 67, 54, 0.3);
        color: #f44336;
    }

    .widget-action-btn.move {
        cursor: grab;
    }

    .installed-widget-preview {
        height: 80px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.3);
        font-size: 13px;
        overflow: hidden;
    }

    .empty-installed {
        text-align: center;
        padding: 60px 20px;
        color: rgba(255, 255, 255, 0.5);
    }

    .empty-installed-icon {
        font-size: 48px;
        margin-bottom: 16px;
    }

    .empty-installed-text {
        font-size: 14px;
        margin-bottom: 20px;
    }

    .widgets-store-section {
        margin-top: 40px;
    }

    .store-widgets-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
        margin-top: 16px;
    }

    .store-widget-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 16px;
        transition: all 0.3s;
        cursor: pointer;
    }

    .store-widget-card:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
    }

    .store-widget-card.installed {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .store-widget-card.installed:hover {
        transform: none;
    }

    .store-widget-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
    }

    .store-widget-name {
        font-size: 15px;
        font-weight: 600;
        color: white;
    }

    .store-widget-badge {
        padding: 4px 10px;
        background: rgba(76, 175, 80, 0.2);
        color: #4CAF50;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
    }

    .store-widget-badge.installed {
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.5);
    }

    .store-widget-desc {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 12px;
        line-height: 1.5;
    }

    .store-widget-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.4);
    }

    .store-widget-add-btn {
        padding: 6px 14px;
        background: rgba(25, 118, 210, 0.2);
        border: 1px solid #1976D2;
        border-radius: 6px;
        color: #1976D2;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
    }

    .store-widget-add-btn:hover {
        background: rgba(25, 118, 210, 0.4);
    }

    .store-widget-add-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s;
        border-radius: 12px;
    }

    .loading-overlay.show {
        opacity: 1;
        visibility: visible;
    }

    .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #1976D2;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: rgba(50, 50, 50, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 12px 24px;
        color: white;
        font-size: 14px;
        z-index: 2000;
        opacity: 0;
        transition: all 0.3s ease;
        pointer-events: none;
    }

    .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }

    .toast.success {
        border-color: #4CAF50;
        background: rgba(76, 175, 80, 0.2);
    }

    .toast.error {
        border-color: #f44336;
        background: rgba(244, 67, 54, 0.2);
    }

    .drag-hint {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.4);
        margin-top: 12px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 6px;
    }

    .drag-hint-icon {
        font-size: 16px;
    }

    .confirm-modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .confirm-modal.show {
        display: flex;
    }

    .confirm-content {
        background: #2a2a2a;
        border-radius: 12px;
        padding: 24px;
        max-width: 400px;
        width: 90%;
        text-align: center;
        animation: modalFadeIn 0.2s ease;
    }

    @keyframes modalFadeIn {
        from {
            opacity: 0;
            transform: scale(0.95);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    .confirm-title {
        font-size: 18px;
        font-weight: 600;
        color: white;
        margin-bottom: 12px;
    }

    .confirm-message {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 24px;
        line-height: 1.5;
    }

    .confirm-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
    }

    .confirm-btn {
        padding: 10px 24px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
    }

    .confirm-btn.cancel {
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.8);
    }

    .confirm-btn.cancel:hover {
        background: rgba(255, 255, 255, 0.15);
    }

    .confirm-btn.danger {
        background: rgba(244, 67, 54, 0.8);
        color: white;
    }

    .confirm-btn.danger:hover {
        background: #f44336;
    }

    .widget-type-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        margin-left: 8px;
    }

    .widget-type-badge.enabled {
        background: rgba(76, 175, 80, 0.2);
        color: #4CAF50;
    }

    .widget-type-badge.disabled {
        background: rgba(255, 152, 0, 0.2);
        color: #ffb74d;
    }
</style>

<div class="page-header">
    <button class="back-btn" onclick="switchPage('home')">
        <img src="../assets/icon/arrow-left-solid-full.svg" alt="Back">
    </button>
    <h1 data-i18n="widgets.store_title">小组件管理</h1>
</div>

<div class="page-body">
    <div class="widgets-section-header">
        <h2 class="section-title" data-i18n="widgets.installed">已安装</h2>
        <!-- <button class="add-widget-btn" id="add-widget-btn">
            <span>+</span>
            <span data-i18n="widgets.add">添加小组件</span>
        </button> -->
    </div>

    <div class="widgets-installed-section">
        <div class="drag-hint">
            <span class="drag-hint-icon">&#8693;</span>
            <span data-i18n="widgets.drag_hint">拖拽可调整顺序</span>
        </div>
        <div class="installed-widgets-grid" id="installed-widgets-grid"></div>
    </div>

    <div class="widgets-store-section">
        <h2 class="section-title" data-i18n="widgets.store">小组件商店</h2>
        <div class="store-widgets-grid" id="store-widgets-grid"></div>
    </div>
</div>

<div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner"></div>
</div>

<div class="toast" id="toast"></div>

<div class="confirm-modal" id="confirm-modal">
    <div class="confirm-content">
        <h3 class="confirm-title" id="confirm-title"></h3>
        <p class="confirm-message" id="confirm-message"></p>
        <div class="confirm-actions">
            <button class="confirm-btn cancel" data-i18n="common.cancel">取消</button>
            <button class="confirm-btn danger" id="confirm-btn" data-i18n="common.confirm">确认</button>
        </div>
    </div>
</div>
